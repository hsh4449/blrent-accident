<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>아레스렌트카 · 광고 분석 대시보드</title>
<style>
  :root{
    --ink:#16202e; --sub:#647084; --line:#e6eaf0; --bg:#f5f7fa; --card:#fff;
    --navy:#1f3a5f; --blue:#2f6df0; --green:#1faa6b; --amber:#e8a13a; --red:#e0524b; --violet:#7b61ff;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    line-height:1.55;-webkit-font-smoothing:antialiased;}
  header.hero{background:linear-gradient(135deg,#1f3a5f,#2f6df0);color:#fff;padding:30px 20px;}
  .hero .inner{max-width:1000px;margin:0 auto;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
  .hero h1{margin:0;font-size:22px;font-weight:800;letter-spacing:-.4px;}
  .hero .spacer{flex:1;}
  .hero .upd{font-size:12px;opacity:.85;}
  .hero button{background:rgba(255,255,255,.18);color:#fff;border:1px solid rgba(255,255,255,.3);
    border-radius:8px;padding:7px 14px;font-size:13px;cursor:pointer;}
  .wrap{max-width:1000px;margin:0 auto;padding:22px 20px 70px;}
  #status{padding:50px;text-align:center;color:var(--sub);}
  .err{color:var(--red);}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:6px;}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px 18px;}
  .kpi .l{font-size:12.5px;color:var(--sub);margin-bottom:6px;}
  .kpi .v{font-size:25px;font-weight:800;letter-spacing:-.5px;}
  .kpi .v small{font-size:13px;color:var(--sub);font-weight:600;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  @media(max-width:760px){.grid{grid-template-columns:1fr;}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px 22px;margin-top:16px;}
  .card.full{grid-column:1 / -1;}
  h2{font-size:11px;letter-spacing:1px;color:var(--blue);font-weight:700;margin:0 0 2px;text-transform:uppercase;}
  .h2sub{font-size:17px;font-weight:800;margin:0 0 14px;letter-spacing:-.3px;}
  .bar-row{display:grid;grid-template-columns:52px 1fr 84px;align-items:center;gap:10px;margin:5px 0;font-size:12.5px;}
  .bar-row .lbl{font-weight:600;}
  .track{background:#eef1f6;border-radius:5px;height:20px;overflow:hidden;}
  .fill{height:100%;border-radius:5px;display:flex;align-items:center;justify-content:flex-end;padding-right:7px;color:#fff;font-size:11px;font-weight:700;min-width:24px;white-space:nowrap;}
  .meta{font-size:11.5px;color:var(--sub);text-align:right;}
  .legend{font-size:11.5px;color:var(--sub);margin-top:9px;}
  .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin:0 3px 0 9px;vertical-align:middle;}
  .catbar{display:flex;height:30px;border-radius:8px;overflow:hidden;margin:4px 0 14px;font-size:11.5px;font-weight:700;color:#fff;}
  .catbar span{display:grid;place-items:center;min-width:0;overflow:hidden;}
  .kwlist .k{display:flex;justify-content:space-between;border-bottom:1px dashed var(--line);padding:6px 2px;font-size:13.5px;}
  .kwlist .k b{color:var(--navy);}
  .conv{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;text-align:center;}
  .conv .c{background:#f8fafc;border:1px solid var(--line);border-radius:12px;padding:14px;}
  .conv .c .n{font-size:24px;font-weight:800;}
  .conv .c .t{font-size:12.5px;color:var(--sub);}
  .hint{font-size:12.5px;color:#7a5b1e;background:#fff8ec;border:1px solid #f3e0bb;border-radius:10px;padding:11px 14px;margin-top:12px;}
  footer{text-align:center;color:var(--sub);font-size:11.5px;margin-top:24px;}
  /* iframe 임베드 모드 (메인 대시보드 '광고 분석' 탭) — 다크 + 헤더 숨김 */
  body.embed{ --ink:#e6e8ec; --sub:#9aa0aa; --line:#272b34; --bg:transparent; --card:#1a1d24; --navy:#86a8ff; background:transparent; }
  body.embed header.hero{ display:none; }
  body.embed .wrap{ padding:6px 4px 24px; }
  body.embed .track{ background:#23262e; }
  body.embed .conv .c{ background:#15171d; }
  body.embed .hint{ color:#ffd9a0; background:#2a2410; border-color:#4a3f1c; }
</style>
</head>
<body>
<header class="hero"><div class="inner">
  <h1>📊 아레스 광고 분석 대시보드</h1>
  <span class="spacer"></span>
  <span class="upd" id="upd"></span>
  <button id="refresh">새로고침</button>
</div></header>

<div class="wrap">
  <div id="status">불러오는 중…</div>
  <div id="content" style="display:none;">

    <div class="kpis" id="kpis"></div>

    <div class="grid">
      <div class="card"><h2>방문 집중 — 시간대</h2><div class="h2sub">언제 들어오나 (스마트로그)</div><div id="hourBars"></div>
        <div class="legend">막대=방문 · 색=품질(방문당 체류)
          <span class="dot" style="background:var(--green)"></span>양질
          <span class="dot" style="background:var(--blue)"></span>보통+
          <span class="dot" style="background:var(--amber)"></span>보통
          <span class="dot" style="background:var(--red)"></span>봇의심</div></div>
      <div class="card"><h2>방문 집중 — 요일</h2><div class="h2sub">무슨 요일이 강한가</div><div id="weekBars"></div>
        <div class="legend">막대=방문 · 색=품질(체류)</div></div>
    </div>

    <div class="card full"><h2>일별 방문 추이</h2><div class="h2sub" id="dailySub">최근 일별 방문수</div><div id="dailyBars"></div></div>

    <div class="grid">
      <div class="card"><h2>키워드 카테고리</h2><div class="h2sub">무엇으로 들어오나</div>
        <div class="catbar" id="catBar"></div><div id="catLegend" class="legend"></div></div>
      <div class="card"><h2>상위 키워드</h2><div class="h2sub" id="kwSub">최근 30일 유입</div><div class="kwlist" id="kwList"></div></div>
    </div>

    <div class="card full"><h2>자체 추적 — 전환</h2><div class="h2sub" id="convSub">우리 사이트 방문자의 실제 행동</div>
      <div class="conv" id="convBox"></div>
      <div class="hint" id="convHint"></div></div>

  </div>
</div>

<script>
const SUPABASE_URL='https://jjwsnwnfhqcszwmjdcac.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impqd3Nud25maHFjc3p3bWpkY2FjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk3NTk3NjgsImV4cCI6MjA4NTMzNTc2OH0.8sH1l1fVKEc48qzT6u4qFyUDPZGaLndcYi8si21dtoc';
const H={apikey:KEY,Authorization:'Bearer '+KEY};
const $=s=>document.querySelector(s);
const SVID='36572';
const WD_ORDER=['월','화','수','목','금','토','일'];
const num=v=>v==null?0:(+v||0);

const EMBED = new URLSearchParams(location.search).get('embed');
if(EMBED) document.body.classList.add('embed');
function postHeight(){ if(EMBED){ try{ parent.postMessage({type:'adheight', h:document.documentElement.scrollHeight}, '*'); }catch(e){} } }
window.addEventListener('load', ()=>setTimeout(postHeight,200));

async function sb(path){ const r=await fetch(SUPABASE_URL+'/rest/v1/'+path,{headers:H}); if(!r.ok) throw new Error('Supabase '+r.status); return r.json(); }
function qcolor(dwell){ return dwell>=150?'var(--green)':dwell>=80?'var(--blue)':dwell>=40?'var(--amber)':'var(--red)'; }
function fmtDwell(s){ return s>=60?Math.floor(s/60)+'분 '+Math.round(s%60)+'초':Math.round(s)+'초'; }

function bars(el,rows,opt){
  // rows: [{label, value, dwell}]
  const max=Math.max(1,...rows.map(r=>r.value));
  el.innerHTML=rows.map(r=>{
    const w=Math.max(4,Math.round(r.value/max*100));
    const col=opt.color? opt.color(r):'var(--blue)';
    const meta=opt.meta? opt.meta(r):'';
    return `<div class="bar-row"><span class="lbl">${r.label}</span>
      <div class="track"><div class="fill" style="width:${w}%;background:${col}">${r.value}</div></div>
      <span class="meta">${meta}</span></div>`;
  }).join('');
}

function categorize(kw){
  const regions=['대전','인천','광주','청주','천안','서울','구미','수원','평택','전주','부산','대구','울산','경기','일산','분당','안양','용인','김포'];
  if(kw.includes('수입차')) return '수입차';
  if(regions.some(r=>kw.includes(r))) return '지역+사고대차';
  if(/사고대차|사고차|사고렌트|교통사고|보험대차/.test(kw)) return '사고대차 일반';
  return '기타';
}
const CAT_COLOR={'사고대차 일반':'var(--navy)','지역+사고대차':'var(--blue)','수입차':'var(--green)','기타':'var(--sub)'};

async function load(){
  $('#status').style.display='block'; $('#status').className=''; $('#status').textContent='불러오는 중…';
  try{
    const [daily,kw,dim,ares]=await Promise.all([
      sb(`smartlog_daily?svid=eq.${SVID}&select=date,visit_count,page_view&order=date`),
      sb(`smartlog_keyword?svid=eq.${SVID}&select=keyword,visit_count,snapshot_date&order=snapshot_date.desc,visit_count.desc`),
      sb(`smartlog_dimension?svid=eq.${SVID}&select=dim_type,dim_value,visit_count,visit_time,snapshot_date&order=snapshot_date.desc`),
      sb(`ares_analytics?select=event_type,created_at&order=created_at.desc&limit=50000`)
    ]);
    render(daily,kw,dim,ares);
    $('#status').style.display='none'; $('#content').style.display='block';
    $('#upd').textContent='업데이트 '+new Date().toLocaleString('ko-KR');
    setTimeout(postHeight, 100);
  }catch(e){ $('#status').className='err'; $('#status').textContent='오류: '+e.message; }
}

function render(daily,kw,dim,ares){
  // ---- 최신 스냅샷만 ----
  const kwSnap=kw.length?kw[0].snapshot_date:null;
  const kwLatest=kw.filter(r=>r.snapshot_date===kwSnap);
  const dimSnap=dim.length?dim[0].snapshot_date:null;
  const dimLatest=dim.filter(r=>r.snapshot_date===dimSnap);
  const byType=t=>dimLatest.filter(r=>r.dim_type===t);

  // ---- KPI ----
  const dVis=daily.map(d=>num(d.visit_count));
  const avg=dVis.length?Math.round(dVis.reduce((a,b)=>a+b,0)/dVis.length):0;
  const pv=ares.filter(r=>r.event_type==='pageview').length;
  const conv=ares.filter(r=>['click_phone','click_kakao','submit_consult'].includes(r.event_type)).length;
  const kwSum=kwLatest.reduce((a,r)=>a+num(r.visit_count),0);
  const kpis=[
    ['스마트로그 일평균 방문', avg],
    ['추적 키워드', kwLatest.length],
    ['자체추적 방문(PV)', pv],
    ['자체 전환(전화·카톡·폼)', conv]
  ];
  $('#kpis').innerHTML=kpis.map(k=>`<div class="kpi"><div class="l">${k[0]}</div><div class="v">${k[1].toLocaleString()}</div></div>`).join('');

  // ---- 시간대 ----
  const hours=byType('hour').map(r=>({h:+r.dim_value,value:num(r.visit_count),dwell:num(r.visit_count)?num(r.visit_time)/num(r.visit_count):0}))
    .sort((a,b)=>a.h-b.h).map(r=>({label:String(r.h).padStart(2,'0')+'시',value:r.value,dwell:r.dwell}));
  bars($('#hourBars'),hours,{color:r=>qcolor(r.dwell),meta:r=>'체류 '+fmtDwell(r.dwell)});

  // ---- 요일 ----
  const wkRows=byType('weekday').map(r=>({label:r.dim_value,value:num(r.visit_count),dwell:num(r.visit_count)?num(r.visit_time)/num(r.visit_count):0}))
    .sort((a,b)=>WD_ORDER.indexOf(a.label)-WD_ORDER.indexOf(b.label));
  bars($('#weekBars'),wkRows,{color:r=>qcolor(r.dwell),meta:r=>'체류 '+fmtDwell(r.dwell)});

  // ---- 일별 ----
  const dRows=daily.map(d=>({label:d.date.slice(5),value:num(d.visit_count)}));
  bars($('#dailyBars'),dRows,{color:_=>'var(--blue)',meta:r=>''});
  $('#dailySub').textContent=`최근 ${daily.length}일 일별 방문수`;

  // ---- 키워드 카테고리 ----
  const cat={};
  kwLatest.forEach(r=>{const c=categorize(r.keyword); cat[c]=(cat[c]||0)+num(r.visit_count);});
  const catEntries=Object.entries(cat).sort((a,b)=>b[1]-a[1]);
  $('#catBar').innerHTML=catEntries.map(([c,v])=>{
    const pct=kwSum?Math.round(v/kwSum*100):0;
    return `<span style="width:${pct}%;background:${CAT_COLOR[c]||'var(--sub)'}">${pct>=8?c+' '+pct+'%':''}</span>`;
  }).join('');
  $('#catLegend').innerHTML=catEntries.map(([c,v])=>`<span class="dot" style="background:${CAT_COLOR[c]||'var(--sub)'}"></span>${c} ${kwSum?Math.round(v/kwSum*100):0}%`).join(' ');

  // ---- 상위 키워드 ----
  $('#kwList').innerHTML=kwLatest.slice(0,8).map((r,i)=>`<div class="k"><span>${i+1}. ${r.keyword}</span><b>${num(r.visit_count)}</b></div>`).join('') || '<div class="k">데이터 없음</div>';
  $('#kwSub').textContent=`최근 30일 유입 (스냅샷 ${kwSnap||'-'})`;

  // ---- 자체 전환 ----
  const ph=ares.filter(r=>r.event_type==='click_phone').length;
  const ka=ares.filter(r=>r.event_type==='click_kakao').length;
  const fo=ares.filter(r=>r.event_type==='submit_consult').length;
  $('#convBox').innerHTML=[['📞 전화',ph],['💬 카톡',ka],['✅ 상담신청',fo]].map(c=>`<div class="c"><div class="n">${c[1]}</div><div class="t">${c[0]}</div></div>`).join('');
  const cr=pv?((ph+ka+fo)/pv*100).toFixed(1):'0';
  $('#convSub').textContent=`방문 ${pv} · 전환율 ${cr}%`;
  $('#convHint').textContent = (ph+ka+fo)===0
    ? '아직 전환 0건. 자체 추적이 어제 막 시작됐거나, 사이트의 전화/카톡 버튼이 tel:·kakao 링크가 아니라 추적이 안 될 수 있음 — 점검 필요. 데이터가 쌓이면 키워드별 전환율(진짜 효과)이 여기 연결됩니다.'
    : '전화/카톡/폼 전환이 잡히고 있습니다. 곧 키워드(n_keyword)별 전환율로 확장 예정.';
}

$('#refresh').addEventListener('click',load);
load();
</script>
</body>
</html>
