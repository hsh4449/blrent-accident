<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>아레스렌트카 · 방문 분석</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  :root { --bg:#0f1115; --card:#1a1d24; --line:#272b34; --txt:#e6e8ec; --sub:#9aa0aa; --accent:#4f8cff; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--txt); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo",sans-serif; }
  header { padding:20px 24px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
  header h1 { font-size:18px; margin:0; }
  header .spacer { flex:1; }
  select, button { background:var(--card); color:var(--txt); border:1px solid var(--line); border-radius:8px; padding:8px 12px; font-size:14px; cursor:pointer; }
  .wrap { padding:24px; max-width:1200px; margin:0 auto; }
  .kpis { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:14px; margin-bottom:24px; }
  .kpi { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:16px 18px; }
  .kpi .label { color:var(--sub); font-size:13px; margin-bottom:8px; }
  .kpi .value { font-size:26px; font-weight:700; }
  .kpi .value small { font-size:14px; color:var(--sub); font-weight:400; }
  .grid { display:grid; grid-template-columns:2fr 1fr; gap:16px; margin-bottom:16px; }
  .grid.two { grid-template-columns:1fr 1fr; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:18px; }
  .card h2 { font-size:14px; margin:0 0 14px; color:var(--sub); font-weight:600; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th,td { text-align:left; padding:8px 10px; border-bottom:1px solid var(--line); white-space:nowrap; }
  th { color:var(--sub); font-weight:600; }
  .muted { color:var(--sub); }
  #status { padding:40px; text-align:center; color:var(--sub); }
  .err { color:#ff6b6b; }
  /* Chart.js(maintainAspectRatio:false) 무한 증가 방지: 부모에 고정 높이 */
  .cbox { position:relative; width:100%; }
  @media (max-width:820px){ .grid,.grid.two{ grid-template-columns:1fr; } }
</style>
</head>
<body>
<header>
  <h1>📊 아레스렌트카 방문 분석</h1>
  <span class="spacer"></span>
  <select id="range">
    <option value="1">오늘</option>
    <option value="7">최근 7일</option>
    <option value="30" selected>최근 30일</option>
    <option value="90">최근 90일</option>
  </select>
  <button id="refresh">새로고침</button>
</header>

<div class="wrap">
  <div id="status">불러오는 중…</div>
  <div id="content" style="display:none;">
    <div class="kpis" id="kpis"></div>
    <div class="grid">
      <div class="card"><h2>일별 방문 추이 (페이지뷰 / 순방문자)</h2><div class="cbox" style="height:280px"><canvas id="chartDaily"></canvas></div></div>
      <div class="card"><h2>유입경로</h2><div class="cbox" style="height:280px"><canvas id="chartRef"></canvas></div></div>
    </div>
    <div class="grid two">
      <div class="card"><h2>기기 비율</h2><div class="cbox" style="height:240px"><canvas id="chartDevice"></canvas></div></div>
      <div class="card"><h2>버튼 전환 (클릭/신청)</h2><div class="cbox" style="height:240px"><canvas id="chartConv"></canvas></div></div>
    </div>
    <div class="card">
      <h2>최근 전환 이벤트 (전화·카톡·상담신청)</h2>
      <div style="overflow-x:auto;"><table id="recent"><thead><tr>
        <th>시각</th><th>유형</th><th>유입</th><th>기기</th><th>OS</th><th>브라우저</th>
      </tr></thead><tbody></tbody></table></div>
    </div>
  </div>
</div>

<script>
// 공유 blrent Supabase (RLS off, anon r/w)
const SUPABASE_URL = 'https://jjwsnwnfhqcszwmjdcac.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impqd3Nud25maHFjc3p3bWpkY2FjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk3NTk3NjgsImV4cCI6MjA4NTMzNTc2OH0.8sH1l1fVKEc48qzT6u4qFyUDPZGaLndcYi8si21dtoc';

const ENDPOINT = SUPABASE_URL.replace(/\/+$/,'') + '/rest/v1/ares_analytics';
const $ = s => document.querySelector(s);
const charts = {};

function setStatus(msg, isErr) {
  const el = $('#status');
  el.style.display = 'block';
  el.className = isErr ? 'err' : '';
  el.textContent = msg;
  $('#content').style.display = 'none';
}

async function fetchRows(days) {
  const since = new Date(Date.now() - days*864e5).toISOString();
  const url = ENDPOINT + '?select=*&created_at=gte.' + since + '&order=created_at.desc&limit=50000';
  const res = await fetch(url, { headers: { apikey: SUPABASE_ANON_KEY, Authorization: 'Bearer ' + SUPABASE_ANON_KEY } });
  if (!res.ok) throw new Error('Supabase 응답 ' + res.status + ' — URL/KEY 또는 테이블을 확인하세요');
  return res.json();
}

function fmtDuration(sec) {
  if (!sec || sec < 1) return '0초';
  const m = Math.floor(sec/60), s = sec%60;
  return m ? (m + '분 ' + s + '초') : (s + '초');
}
function dayKey(iso){ return iso.slice(0,10); }

function render(rows) {
  if (!rows.length) { setStatus('아직 수집된 데이터가 없습니다. (트래커 설치 후 방문이 발생하면 표시됩니다)'); return; }
  $('#status').style.display = 'none';
  $('#content').style.display = 'block';

  const pv = rows.filter(r => r.event_type === 'pageview');
  const exits = rows.filter(r => r.event_type === 'page_exit' && r.duration_sec > 0);
  const visitors = new Set(pv.map(r => r.visitor_id).filter(Boolean));
  const phone = rows.filter(r => r.event_type === 'click_phone').length;
  const kakao = rows.filter(r => r.event_type === 'click_kakao').length;
  const consult = rows.filter(r => r.event_type === 'submit_consult').length;
  const avgDur = exits.length ? Math.round(exits.reduce((a,r)=>a+r.duration_sec,0)/exits.length) : 0;
  const ctr = pv.length ? (((phone+kakao+consult)/pv.length)*100).toFixed(1) : '0';

  // KPI
  const kpis = [
    ['총 페이지뷰', pv.length.toLocaleString()],
    ['순 방문자', visitors.size.toLocaleString()],
    ['평균 체류시간', fmtDuration(avgDur)],
    ['전화 클릭', phone.toLocaleString()],
    ['카톡 클릭', kakao.toLocaleString()],
    ['상담신청', consult.toLocaleString()],
    ['전환율', ctr + '<small>%</small>']
  ];
  $('#kpis').innerHTML = kpis.map(k => '<div class="kpi"><div class="label">'+k[0]+'</div><div class="value">'+k[1]+'</div></div>').join('');

  // 일별 추이
  const byDay = {};
  pv.forEach(r => { const d = dayKey(r.created_at); (byDay[d] = byDay[d] || {pv:0, v:new Set()}); byDay[d].pv++; if(r.visitor_id) byDay[d].v.add(r.visitor_id); });
  const days = Object.keys(byDay).sort();
  drawChart('chartDaily', 'line', {
    labels: days,
    datasets: [
      { label:'페이지뷰', data: days.map(d=>byDay[d].pv), borderColor:'#4f8cff', backgroundColor:'rgba(79,140,255,.15)', fill:true, tension:.3 },
      { label:'순방문자', data: days.map(d=>byDay[d].v.size), borderColor:'#46d39a', backgroundColor:'transparent', tension:.3 }
    ]
  });

  // 유입경로
  const refMap = {};
  pv.forEach(r => {
    let key = r.utm_source || r.referrer_host || '직접유입/북마크';
    if (/naver/i.test(key)) key='네이버';
    else if (/google/i.test(key)) key='구글';
    else if (/kakao|daum/i.test(key)) key='카카오/다음';
    else if (/instagram|facebook/i.test(key)) key='인스타/페북';
    refMap[key] = (refMap[key]||0)+1;
  });
  const refSorted = Object.entries(refMap).sort((a,b)=>b[1]-a[1]);
  drawChart('chartRef', 'doughnut', {
    labels: refSorted.map(e=>e[0]),
    datasets: [{ data: refSorted.map(e=>e[1]), backgroundColor:['#4f8cff','#46d39a','#ffb454','#ff6b6b','#a78bfa','#f472b6','#94a3b8'] }]
  }, { plugins:{ legend:{ position:'right', labels:{ color:'#e6e8ec' } } } });

  // 기기
  const devMap = {};
  pv.forEach(r => { const d = r.device||'기타'; devMap[d]=(devMap[d]||0)+1; });
  drawChart('chartDevice', 'pie', {
    labels: Object.keys(devMap), datasets:[{ data:Object.values(devMap), backgroundColor:['#4f8cff','#ffb454','#46d39a','#94a3b8'] }]
  }, { plugins:{ legend:{ position:'right', labels:{ color:'#e6e8ec' } } } });

  // 전환
  drawChart('chartConv', 'bar', {
    labels:['전화','카톡','상담신청'],
    datasets:[{ data:[phone,kakao,consult], backgroundColor:['#4f8cff','#ffb454','#46d39a'] }]
  }, { plugins:{ legend:{ display:false } } });

  // 최근 전환 테이블
  const conv = rows.filter(r => ['click_phone','click_kakao','submit_consult'].includes(r.event_type)).slice(0,40);
  const label = { click_phone:'📞 전화', click_kakao:'💬 카톡', submit_consult:'✅ 상담신청' };
  $('#recent tbody').innerHTML = conv.length ? conv.map(r =>
    '<tr><td>'+new Date(r.created_at).toLocaleString('ko-KR')+'</td><td>'+(label[r.event_type]||r.event_type)+
    '</td><td>'+(r.utm_source||r.referrer_host||'직접')+'</td><td>'+(r.device||'')+'</td><td>'+(r.os||'')+'</td><td>'+(r.browser||'')+'</td></tr>'
  ).join('') : '<tr><td colspan="6" class="muted">전환 이벤트 없음</td></tr>';
}

function drawChart(id, type, data, opts) {
  if (charts[id]) charts[id].destroy();
  charts[id] = new Chart($('#'+id), {
    type, data,
    options: Object.assign({ responsive:true, maintainAspectRatio:false,
      scales: (type==='line'||type==='bar') ? { x:{ ticks:{color:'#9aa0aa'}, grid:{color:'#272b34'} }, y:{ ticks:{color:'#9aa0aa'}, grid:{color:'#272b34'} } } : {},
      plugins:{ legend:{ labels:{ color:'#e6e8ec' } } }
    }, opts||{})
  });
}

async function load() {
  if (SUPABASE_URL.indexOf('__') === 0) { setStatus('⚙️ dashboard.html 상단의 SUPABASE_URL / SUPABASE_ANON_KEY 를 먼저 채워주세요.', true); return; }
  setStatus('불러오는 중…');
  try { render(await fetchRows(parseInt($('#range').value,10))); }
  catch (e) { setStatus('오류: ' + e.message, true); }
}
$('#range').addEventListener('change', load);
$('#refresh').addEventListener('click', load);
load();
</script>
</body>
</html>
